name: Build and Test

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Angular application
        run: npm run build:prod

      - name: Compile TypeScript backend
        run: node ./node_modules/typescript/lib/tsc ./server.ts --target es6 --types node --module commonjs --sourcemap --skipLibCheck

      - name: Compile backend tests
        run: node ./node_modules/typescript/lib/tsc ./src/server/MoInstallSQL.test.ts --target es6 --types node,mocha --module commonjs --sourcemap --skipLibCheck

      - name: Run backend tests
        run: npm run test:backend

      - name: Run frontend tests with coverage
        run: npm run coverage:frontend

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: coverage/

      - name: Install Playwright dependencies
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run e2e
        continue-on-error: true

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: playwright-report/

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Build, unit tests, and E2E tests completed.\n\n📊 Artifacts:\n- Coverage reports: check coverage-reports artifact\n- E2E test results: check e2e-test-results artifact'
            })
